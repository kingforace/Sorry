<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Favorite Sister</title>
    <style>
        :root {
            --primary: #ff85a1;
            --secondary: #fbb1bd;
            --bg: #fff0f3;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Floating background shapes */
        .shape {
            position: absolute;
            background: var(--secondary);
            border-radius: 50%;
            opacity: 0.3;
            animation: float 6s infinite ease-in-out;
            z-index: -1;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(255, 133, 161, 0.2);
            text-align: center;
            max-width: 400px;
            width: 90%;
            transform: scale(0.9);
            animation: popIn 0.8s cubic-bezier(0.17, 0.67, 0.83, 0.67) forwards;
        }

        @keyframes popIn {
            to { transform: scale(1); }
        }

        h1 { color: var(--primary); margin-bottom: 10px; }
        p { color: #666; line-height: 1.5; }

        /* The Progress Bar */
        .progress-container {
            width: 100%;
            background: #eee;
            border-radius: 20px;
            margin: 20px 0;
            height: 10px;
            overflow: hidden;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: var(--primary);
            transition: width 2s ease-in-out;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 133, 161, 0.4);
            transition: all 0.3s;
        }

        .btn:hover {
            background: #ff4d6d;
            transform: translateY(-3px);
        }

        #forgive-section { display: none; margin-top: 20px; animation: fadeIn 1s; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .emoji { font-size: 3rem; display: block; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="shape" style="width: 80px; height: 80px; top: 10%; left: 10%;"></div>
    <div class="shape" style="width: 120px; height: 120px; bottom: 15%; right: 10%; animation-delay: 2s;"></div>

    <div class="card">
        <span class="emoji">🥺</span>
        <h1>Sorry, Guddu!</h1>
        <p>I know I messed up. My "Be a Good Sibling" software crashed today. Can we restart?</p>
        
        <div class="progress-container">
            <div class="progress-bar" id="bar"></div>
        </div>
        <p id="status" style="font-size: 0.8rem; font-weight: bold;">Peace status: 0%</p>

        <button class="btn" id="repair-btn" onclick="startRepair()">Click to Repair Bond</button>

        <div id="forgive-section">
            <p><strong>System Fixed!</strong><br>I promise to be 10% less annoying for the next 24 hours.</p>
            <div style="font-size: 2rem;">💖✨🎁</div>
        </div>
    </div>

    <script>
        function startRepair() {
            const btn = document.getElementById('repair-btn');
            const bar = document.getElementById('bar');
            const status = document.getElementById('status');
            const finalSection = document.getElementById('forgive-section');

            btn.style.display = 'none';
            bar.style.width = '100%';
            
            let count = 0;
            const interval = setInterval(() => {
                count++;
                status.innerText = `Peace status: ${count}%`;
                if(count === 100) {
                    clearInterval(interval);
                    finalSection.style.display = 'block';
                    status.innerText = "Bond successfully repaired!";
                }
            }, 20);
        }
    </script>
</body>
</html>
